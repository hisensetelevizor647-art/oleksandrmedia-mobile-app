name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Export signing SHA-1
        run: |
          mkdir -p build/metadata
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -n 1)
          SHA1_HEX=$($APKSIGNER verify --print-certs build/app/outputs/flutter-apk/app-release.apk | grep "Signer #1 certificate SHA-1 digest:" | awk -F': ' '{print $2}')
          SHA1_FORMATTED=$(echo "$SHA1_HEX" | sed 's/../&:/g; s/:$//' | tr '[:lower:]' '[:upper:]')
          echo "$SHA1_FORMATTED" > build/metadata/sha1.txt
          echo "### Android signing SHA-1" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$SHA1_FORMATTED\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK and SHA-1
        uses: actions/upload-artifact@v4
        with:
          name: oleksandrmedia-android-build
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/metadata/sha1.txt
          if-no-files-found: error
